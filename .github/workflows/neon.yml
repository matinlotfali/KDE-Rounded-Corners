name: KDE Neon (Stable)

on:
  push:
    branches: [ master ]
    paths-ignore: [ '**.md', '**.png' ]
  pull_request:
    branches: [ master ]
    paths: [ '**', '!**/**.md', '!**/**.png', '!**/**.yml', '**/neon.yml' ]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  DEB_NAME: kwin4_effect_shapecorners

jobs:
  neon:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest
    container:
      image: invent-registry.kde.org/neon/docker-images/plasma:user
      options: --user root
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

    steps:
    - name: Check out repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Refresh Ubuntu Packages
      run: sudo apt-get update && sudo apt-get full-upgrade -y --allow-downgrades

    - name: Install Dependencies
      run: |
        sudo apt-get -y install --no-install-recommends cmake g++ gettext extra-cmake-modules qt6-base-dev-tools libkf6configwidgets-dev libkf6kcmutils-dev kwin-dev kwin-x11-dev
        sudo apt-get -y install --no-install-recommends dpkg-dev file
        
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: c-cpp
        build-mode: manual

    
    - name: Configure & Build Wayland
      run: |
        cmake . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        cmake --build . --config ${{env.BUILD_TYPE}} -j

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:c-cpp"

    - name: Package Wayland
      run: |
        cpack -V -G DEB
        mkdir -p artifacts
        mv ${DEB_NAME}.deb artifacts/${DEB_NAME}_${GITHUB_JOB}.deb
        echo "DEB_FILE_WAYLAND=artifacts/${DEB_NAME}_${GITHUB_JOB}.deb" >> $GITHUB_ENV

    - name: Configure & Build X11
      run: |
        cmake . -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DKWIN_X11=ON
        cmake --build . --config ${{env.BUILD_TYPE}} -j

    - name: Package X11
      run: |
        cpack -V -G DEB
        mv ${DEB_NAME}_x11.deb artifacts/${DEB_NAME}_${GITHUB_JOB}_x11.deb
        echo "DEB_FILE_X11=artifacts/${DEB_NAME}_${GITHUB_JOB}_x11.deb" >> $GITHUB_ENV

    - name: Upload Workflow Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ${{ env.DEB_NAME }}
        path: artifacts/
        compression-level: 0
        if-no-files-found: error

    - name: Upload to Launchpad PPA
      if: github.ref == 'refs/heads/master'
      env:
        GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
        GPG_KEY_ID: DCCACDF0AE2E535CEF20ABC1916523094AD3BA70
      run: |
        sudo apt-get install -y debhelper dput devscripts git
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import

        # Compute version: <tag_version>.<rev_count>-<kwin_version>
        LAST_TAG=$(git describe --tags --abbrev=0)
        REV_COUNT=$(git rev-list --count ${LAST_TAG}..HEAD)
        TAG_VERSION=$(echo ${LAST_TAG} | sed 's/^v//')
        KWIN_VERSION=$(dpkg -s kwin-dev | grep '^Version:' | cut -d' ' -f2 | sed 's/^[0-9]*://' | cut -d'-' -f1)
        PKG_VERSION="${TAG_VERSION}.${REV_COUNT}.${KWIN_VERSION}"

        sh tools/upload-to-launchpad.sh "$DEB_FILE_WAYLAND" kwin-effect-roundcorners-neon "$PKG_VERSION" neon noble
        sh tools/upload-to-launchpad.sh "$DEB_FILE_X11" kwin-effect-roundcorners-x11-neon "$PKG_VERSION" neon noble

    - name: Upload Wayland to SourceForge
      if: github.ref == 'refs/heads/master'
      uses: nicklasfrahm/scp-action@main
      with:
        direction: upload
        host: ${{ secrets.SOURCEFORGE_HOST }}
        username: ${{ secrets.SOURCEFORGE_USERNAME }}
        key: ${{ secrets.SOURCEFORGE_KEY }}
        fingerprint: ${{ secrets.SOURCEFORGE_HOST_FINGERPRINT }}
        source: ${{ env.DEB_FILE_WAYLAND }}
        target: /home/frs/project/kde-rounded-corners/nightly/neon/

    - name: Upload X11 to SourceForge
      if: github.ref == 'refs/heads/master'
      uses: nicklasfrahm/scp-action@main
      with:
        direction: upload
        host: ${{ secrets.SOURCEFORGE_HOST }}
        username: ${{ secrets.SOURCEFORGE_USERNAME }}
        key: ${{ secrets.SOURCEFORGE_KEY }}
        fingerprint: ${{ secrets.SOURCEFORGE_HOST_FINGERPRINT }}
        source: ${{ env.DEB_FILE_X11 }}
        target: /home/frs/project/kde-rounded-corners/nightly/neon/

